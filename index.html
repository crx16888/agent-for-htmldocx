<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人文档排版编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="panel settings-panel" aria-label="排版习惯">
          <div class="brand">
            <div>
              <p class="eyebrow" id="appEyebrow">Personal Layout Editor</p>
              <h1 id="appTitle">个人文档排版编辑器</h1>
            </div>
            <button class="icon-button" id="resetButton" type="button" title="恢复默认习惯" aria-label="恢复默认习惯">↺</button>
          </div>

          <div class="mode-switch" role="tablist" aria-label="功能模式">
            <button class="mode-button active" id="wechatModeButton" type="button">公众号</button>
            <button class="mode-button" id="wordModeButton" type="button">Word 合同</button>
          </div>

          <div class="control-group">
            <label for="stylePreset">风格模板</label>
            <select id="stylePreset">
              <option value="fresh">清爽杂志流</option>
              <option value="calm">克制知识流</option>
              <option value="sharp">清爽观点流</option>
              <option value="warm">温和叙事流</option>
            </select>
          </div>

          <div class="control-grid">
            <div class="control-group">
              <label for="accentColor">强调色</label>
              <input id="accentColor" type="color" value="#0f766e" />
            </div>
            <div class="control-group">
              <label for="fontSize">字号</label>
              <input id="fontSize" type="range" min="14" max="17" value="15" />
            </div>
            <div class="control-group">
              <label for="lineHeight">行距</label>
              <input id="lineHeight" type="range" min="1.6" max="2.1" step="0.05" value="1.85" />
            </div>
            <div class="control-group">
              <label for="paragraphGap">段距</label>
              <input id="paragraphGap" type="range" min="12" max="28" value="20" />
            </div>
          </div>

          <fieldset class="switch-list">
            <legend>自动处理</legend>
            <label><input id="autoHeadings" type="checkbox" checked /> 智能识别标题层级</label>
            <label><input id="autoShorten" type="checkbox" checked /> 长段落自动拆开</label>
            <label><input id="autoBold" type="checkbox" checked /> 重点符号自动加粗</label>
            <label><input id="autoDivider" type="checkbox" checked /> 二级标题前加留白</label>
          </fieldset>

          <fieldset class="switch-list word-only">
            <legend>Word 合同处理</legend>
            <label><input id="autoContractNumbering" type="checkbox" checked /> 自动识别条款编号</label>
            <label><input id="autoPartyBlock" type="checkbox" checked /> 甲乙方信息重点排版</label>
            <label><input id="autoSignatureBlock" type="checkbox" checked /> 签署区留出空间</label>
          </fieldset>

          <div class="control-group">
            <label for="habitNote">我的排版习惯</label>
            <textarea id="habitNote" rows="6" placeholder="例：标题不要太花；重点句单独成段；结尾保留一句行动提醒。"></textarea>
          </div>

          <button class="primary-button" id="saveHabitButton" type="button">保存习惯</button>
          <p class="hint" id="modeHint">设置会保存在当前浏览器。下一步可以接 AI，让它按这些习惯改写和排版。</p>
        </aside>

        <section class="editor-column" aria-label="正文编辑">
          <div class="toolbar">
            <div class="tabs" role="tablist" aria-label="视图切换">
              <button class="tab active" id="editTab" type="button">编辑</button>
              <button class="tab" id="htmlTab" type="button">HTML</button>
            </div>
            <div class="actions">
              <button class="icon-button" id="formatButton" type="button" title="生成排版" aria-label="生成排版">✓</button>
              <button class="icon-button" id="copyButton" type="button" title="复制富文本" aria-label="复制富文本">⧉</button>
              <button class="icon-button" id="downloadButton" type="button" title="下载文件" aria-label="下载文件">↓</button>
            </div>
          </div>

          <textarea id="sourceInput" class="source-input" spellcheck="false"></textarea>
          <textarea id="htmlOutput" class="html-output hidden" spellcheck="false" readonly></textarea>
        </section>

        <section class="preview-column" aria-label="公众号预览">
          <div class="preview-header">
            <span id="previewTitle">公众号预览</span>
            <span id="statusText">已生成</span>
          </div>
          <article id="preview" class="wechat-preview" contenteditable="true" spellcheck="false" tabindex="0"></article>
          <p class="copy-tip" id="copyTip">如果公众号后台没有保留样式，请点击右侧预览区，按 Command/Ctrl + A，再复制粘贴到正文编辑器。</p>
        </section>
      </section>
    </main>

    <template id="starterTemplate">一套清爽耐看的公众号排版习惯

好的公众号排版，不是把页面装饰得很满，而是让读者愿意继续往下读。

我的默认风格

正文保持 15px，行距偏松，段落之间留一点呼吸感。标题相对更醒目，但不用复杂装饰，只用稳定的强调色和清晰层级。

**重点句单独成段，少量加粗，不要整屏都是重点。**

> 引用适合放观点、金句或小结。它应该帮助读者停一下，而不是抢走正文的注意力。

- 一屏最好能看到 2 到 4 个短段落
- 二级标题前留白，形成自然节奏
- 列表用于归纳，不要滥用
- 强调色只服务重点，不做大面积铺色

常用公众号习惯

多数成熟公众号会控制段落长度、减少花哨样式、保持标题层级一致，并把真正重要的句子单独拎出来。</template>

    <script src="./app.js"></script>
  </body>
</html>

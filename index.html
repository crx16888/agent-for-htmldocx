<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号 AI 改稿排版助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dong Kehan Engine</p>
          <h1>公众号 AI 改稿排版助手</h1>
        </div>
        <div class="topbar-actions">
          <button class="mode-button active" id="wechatModeButton" type="button">公众号</button>
          <button class="mode-button" id="wordModeButton" type="button">Word 合同</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel settings-panel" aria-label="排版习惯">
          <div class="brand panel-heading">
            <div>
              <p class="eyebrow" id="appEyebrow">Preset Templates</p>
              <h2 id="appTitle">预设模板</h2>
            </div>
            <button class="icon-button" id="resetButton" type="button" title="恢复默认习惯" aria-label="恢复默认习惯">↺</button>
          </div>

          <div class="template-grid wechat-only" aria-label="预设模板">
            <button class="template-card active" type="button" data-preset="fresh">
              <strong>董科含长文</strong>
              <span>场景开头、价值转折、克制结尾。</span>
            </button>
            <button class="template-card" type="button" data-preset="sharp">
              <strong>红色洞察</strong>
              <span>编号标题与高亮重点，适合强观点。</span>
            </button>
            <button class="template-card" type="button" data-preset="sharp">
              <strong>橙势简报</strong>
              <span>编号标题、观点突出、适合商业分析。</span>
            </button>
            <button class="template-card" type="button" data-preset="calm">
              <strong>深蓝简报</strong>
              <span>沉稳层级、结构清晰、适合复盘。</span>
            </button>
            <button class="template-card" type="button" data-preset="fresh">
              <strong>科技杂志</strong>
              <span>轻科技感、清晰模块、适合方法论。</span>
            </button>
            <button class="template-card" type="button" data-preset="sharp">
              <strong>知识大V</strong>
              <span>观点卡片、重点句突出、便于转发。</span>
            </button>
            <button class="template-card" type="button" data-preset="calm">
              <strong>Claude 极简</strong>
              <span>高对比、少装饰、适合技术评论。</span>
            </button>
            <button class="template-card" type="button" data-preset="warm">
              <strong>文艺书信</strong>
              <span>柔和背景、留白更多、适合叙事。</span>
            </button>
          </div>

          <div class="theme-strip wechat-only" aria-label="主题色">
            <span>主题色</span>
            <button class="theme-swatch active" type="button" data-color="#2563eb" style="--swatch: #2563eb" aria-label="媒体蓝"></button>
            <button class="theme-swatch" type="button" data-color="#b45309" style="--swatch: #b45309" aria-label="经典橙"></button>
            <button class="theme-swatch" type="button" data-color="#dc2626" style="--swatch: #dc2626" aria-label="洞察红"></button>
            <button class="theme-swatch" type="button" data-color="#1d4ed8" style="--swatch: #1d4ed8" aria-label="深蓝"></button>
            <button class="theme-swatch" type="button" data-color="#111827" style="--swatch: #111827" aria-label="墨黑"></button>
          </div>

          <div class="control-group">
            <label for="stylePreset">风格模板</label>
            <select id="stylePreset">
              <option value="fresh">清爽杂志流</option>
              <option value="calm">克制知识流</option>
              <option value="sharp">清爽观点流</option>
              <option value="warm">温和叙事流</option>
            </select>
          </div>

          <button class="ai-button wechat-only" id="panelAiButton" type="button">一键AI改稿排版</button>

          <div class="control-grid">
            <div class="control-group">
              <label for="accentColor">强调色</label>
              <input id="accentColor" type="color" value="#0f766e" />
            </div>
            <div class="control-group">
              <label for="fontSize">字号</label>
              <input id="fontSize" type="range" min="14" max="17" value="15" />
            </div>
            <div class="control-group">
              <label for="lineHeight">行距</label>
              <input id="lineHeight" type="range" min="1.6" max="2.1" step="0.05" value="1.85" />
            </div>
            <div class="control-group">
              <label for="paragraphGap">段距</label>
              <input id="paragraphGap" type="range" min="12" max="28" value="20" />
            </div>
          </div>

          <fieldset class="switch-list">
            <legend>自动处理</legend>
            <label class="wechat-only"><input id="autoImproveContent" type="checkbox" checked /> 先改善内容再排版</label>
            <label class="wechat-only"><input id="autoTypography" type="checkbox" checked /> 自动判断字号行距</label>
            <label><input id="autoHeadings" type="checkbox" checked /> 智能识别标题层级</label>
            <label><input id="autoShorten" type="checkbox" checked /> 长段落自动拆开</label>
            <label><input id="autoBold" type="checkbox" checked /> 重点符号自动加粗</label>
            <label><input id="autoDivider" type="checkbox" checked /> 二级标题前加留白</label>
          </fieldset>

          <fieldset class="switch-list wechat-only">
            <legend>董科含内容工作流</legend>
            <label><input id="useDongKehan" type="checkbox" checked disabled /> 始终使用项目内 kehan skill</label>
            <div class="control-group compact-control">
              <label for="narrativeDepth">叙事强度</label>
              <input id="narrativeDepth" type="range" min="1" max="5" value="3" />
            </div>
            <label><input id="keepFactsStrict" type="checkbox" checked /> 事实不补写、不冒充作者</label>
          </fieldset>

          <fieldset class="switch-list word-only">
            <legend>Word 合同处理</legend>
            <label><input id="autoContractNumbering" type="checkbox" checked /> 自动识别条款编号</label>
            <label><input id="autoPartyBlock" type="checkbox" checked /> 甲乙方信息重点排版</label>
            <label><input id="autoSignatureBlock" type="checkbox" checked /> 签署区留出空间</label>
          </fieldset>

          <div class="control-group">
            <label for="habitNote">我的排版习惯</label>
            <textarea id="habitNote" rows="6" placeholder="例：标题不要太花；重点句单独成段；结尾保留一句行动提醒。"></textarea>
          </div>

          <div class="control-group wechat-only">
            <label for="imageStyleNote">未来图片风格预设</label>
            <textarea id="imageStyleNote" rows="5" placeholder="例：像某个品牌海报；干净留白；人物真实摄影；暖光；不要卡通。"></textarea>
          </div>

          <button class="primary-button" id="saveHabitButton" type="button">保存习惯</button>
          <p class="hint" id="modeHint">设置会保存在当前浏览器。下一步可以接 AI，让它按这些习惯改写和排版。</p>
        </aside>

        <section class="editor-column" aria-label="正文编辑">
          <div class="toolbar">
            <div class="tabs" role="tablist" aria-label="视图切换">
              <button class="tab active" id="editTab" type="button">编辑</button>
              <button class="tab" id="htmlTab" type="button">HTML</button>
            </div>
            <span class="word-count" id="wordCount">字数: 0</span>
            <div class="actions">
              <button class="smart-button wechat-only-inline" id="improveArticleButton" type="button">一键AI排版</button>
              <button class="smart-button wechat-only-inline ghost" id="promptPackButton" type="button">复制任务包</button>
              <button class="smart-button word-only-inline" id="smartContractButton" type="button">智能生成合同</button>
              <button class="icon-button" id="formatButton" type="button" title="生成排版" aria-label="生成排版">✓</button>
              <button class="icon-button" id="copyButton" type="button" title="复制富文本" aria-label="复制富文本">⧉</button>
              <button class="icon-button" id="downloadButton" type="button" title="下载文件" aria-label="下载文件">↓</button>
            </div>
          </div>

          <textarea id="sourceInput" class="source-input" spellcheck="false" placeholder="公众号模式：粘贴文章正文。Word 合同模式：可以粘贴合同原文，也可以粗略写合作内容、双方权益、付款和交付要求，再点击“智能生成合同”。"></textarea>
          <textarea id="htmlOutput" class="html-output hidden" spellcheck="false" readonly></textarea>
        </section>

        <section class="preview-column" aria-label="公众号预览">
          <div class="preview-header">
            <div>
              <span id="previewTitle">模板预览</span>
              <small id="previewStyleLabel">当前风格：董科含长文</small>
            </div>
            <span id="statusText">已生成</span>
          </div>
          <div class="preview-stage">
            <div class="phone-frame">
              <div class="phone-top">
                <span>9:41</span>
                <span>公众号预览</span>
              </div>
              <div class="article-meta">
                <h2>董科含式内容工作台</h2>
                <p>原创 · 何慢慢 · 今天</p>
              </div>
              <article id="preview" class="wechat-preview" contenteditable="true" spellcheck="false" tabindex="0"></article>
            </div>
            <section class="image-lab wechat-only" aria-label="图片生成预留区">
              <div class="image-lab-header">
                <div>
                  <p class="eyebrow">Image Slot</p>
                  <h2>封面/配图生成</h2>
                </div>
                <button class="smart-button ghost" id="imagePromptButton" type="button">生成提示词</button>
              </div>
              <div class="image-stage" id="imageStage">
                <span>未来接入最强生图模型后，这里生成封面、首图或段落配图。</span>
              </div>
              <textarea id="imagePromptOutput" class="image-prompt-output" rows="4" readonly placeholder="图片提示词会根据文章主题、董科含式叙事氛围和你的风格预设生成。"></textarea>
            </section>
          </div>
          <p class="copy-tip" id="copyTip">如果公众号后台没有保留样式，请点击右侧预览区，按 Command/Ctrl + A，再复制粘贴到正文编辑器。</p>
        </section>
      </section>
    </main>

    <template id="starterTemplate">一套清爽耐看的公众号排版习惯

好的公众号排版，不是把页面装饰得很满，而是让读者愿意继续往下读。

我的默认风格

正文保持 15px，行距偏松，段落之间留一点呼吸感。标题相对更醒目，但不用复杂装饰，只用稳定的强调色和清晰层级。

**重点句单独成段，少量加粗，不要整屏都是重点。**

> 引用适合放观点、金句或小结。它应该帮助读者停一下，而不是抢走正文的注意力。

- 一屏最好能看到 2 到 4 个短段落
- 二级标题前留白，形成自然节奏
- 列表用于归纳，不要滥用
- 强调色只服务重点，不做大面积铺色

常用公众号习惯

多数成熟公众号会控制段落长度、减少花哨样式、保持标题层级一致，并把真正重要的句子单独拎出来。</template>

    <template id="wordTemplate">商务服务合同

合同编号：__________

甲方：__________
统一社会信用代码：__________
地址：__________
联系人：__________

乙方：__________
统一社会信用代码：__________
地址：__________
联系人：__________

鉴于甲方拟委托乙方提供相关服务，双方本着平等、自愿、诚实信用的原则，经友好协商，订立本合同。

第一条 服务内容

乙方应按照本合同约定向甲方提供服务，并保证服务成果符合双方确认的需求、标准及时间安排。

第二条 合同期限

本合同期限自____年__月__日起至____年__月__日止。合同期满后，如双方继续合作，应另行签署书面协议。

第三条 费用及支付

甲方应按照双方确认的付款节点向乙方支付服务费用。乙方应在收款前向甲方提供合法有效的发票或收款凭证。

第四条 保密义务

双方应对在合作过程中知悉的商业秘密、技术资料、客户信息及其他未公开信息承担保密义务。未经对方书面同意，任何一方不得向第三方披露。

第五条 违约责任

任何一方违反本合同约定，给对方造成损失的，应承担相应违约责任，并赔偿守约方因此遭受的实际损失。

第六条 争议解决

因本合同产生或与本合同有关的争议，双方应先友好协商解决；协商不成的，任一方可向合同签署地有管辖权的人民法院提起诉讼。

第七条 其他

本合同自双方盖章或授权代表签字之日起生效。本合同一式两份，甲乙双方各执一份，具有同等法律效力。

甲方（盖章）：__________          乙方（盖章）：__________

授权代表：__________              授权代表：__________

日期：____年__月__日              日期：____年__月__日</template>
    <script src="./app.js"></script>
  </body>
</html>
